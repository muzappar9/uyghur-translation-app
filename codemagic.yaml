workflows:
  android-workflow:
    name: Android Build
    instance_type: linux
    environment:
      java: default
      ndk: r21e
      flutter: stable
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
         - 2287931042@qq.com  # 改成你的邮箱
     

 
 
